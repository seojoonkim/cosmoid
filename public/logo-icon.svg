<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 50" fill="none">
  <!-- 안테나 -->
  <line x1="27" y1="11" x2="33" y2="2"
        stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 몸통 -->
  <rect x="3" y="10" width="38" height="33" rx="11" fill="#7c3aed"/>

  <!-- 왼쪽 눈 -->
  <rect x="11.5" y="20" width="8" height="13" rx="4" fill="white"/>
  <!-- 오른쪽 눈 -->
  <rect x="24.5" y="20" width="8" height="13" rx="4" fill="white"/>

  <!-- 짧은 팔 -->
  <line x1="41" y1="28" x2="46" y2="28"
        stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>

  <!-- 위 집게 — 딸깍 애니메이션 -->
  <g>
    <path d="M46 24 C50 17 56 12 61 15 L59 22 L57 19 L54 24 L52 21 L49 26 L47 23 L46 29 Z"
          fill="#7c3aed"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 46 28; 10 46 28; 10 46 28; 0 46 28; 0 46 28"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline"
      keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s"
      repeatCount="indefinite"/>
  </g>

  <!-- 아래 집게 — 딸깍 애니메이션 -->
  <g>
    <path d="M46 32 C50 39 56 44 61 41 L59 34 L57 37 L54 32 L52 35 L49 30 L47 33 L46 29 Z"
          fill="#7c3aed"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 46 28; -10 46 28; -10 46 28; 0 46 28; 0 46 28"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline"
      keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s"
      repeatCount="indefinite"/>
  </g>
</svg>
