<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 105" fill="none">
  <!-- 안테나 -->
  <line x1="50" y1="21" x2="50" y2="10" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="6" r="5.5" fill="#7c3aed"/>

  <!-- 머리 (외부) -->
  <rect x="10" y="21" width="80" height="54" rx="22" fill="#7c3aed"/>

  <!-- 양쪽 귀 bump -->
  <circle cx="10" cy="48" r="8.5" fill="#7c3aed"/>
  <circle cx="90" cy="48" r="8.5" fill="#7c3aed"/>

  <!-- 얼굴 흰 창 (inner) -->
  <rect x="19" y="29" width="62" height="38" rx="13" fill="white"/>

  <!-- 왼쪽 눈 (어두운 보라 타원) -->
  <rect x="27" y="32" width="17" height="28" rx="8.5" fill="#5b21b6">
    <!-- 깜빡 -->
    <animate attributeName="height" values="28;28;3;28;28" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="32;32;44.5;32;32" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <!-- 좌우 보기 -->
    <animate attributeName="x" values="27;30;30;27;24;24;27;27" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- 오른쪽 눈 -->
  <rect x="56" y="32" width="17" height="28" rx="8.5" fill="#5b21b6">
    <animate attributeName="height" values="28;28;3;28;28" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="32;32;44.5;32;32" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="56;59;59;56;53;53;56;56" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- 집게발 팔 연결 -->
  <line x1="28" y1="75" x2="30" y2="85" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>

  <!-- 집게발 C형 — 딸깍 애니메이션 -->
  <g>
    <path d="M40 83 A16 16 0 1 0 40 105" stroke="#7c3aed" stroke-width="9" stroke-linecap="round" fill="none"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 40 94; -22 40 94; -22 40 94; 0 40 94; 0 40 94"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline" keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s" repeatCount="indefinite"/>
  </g>
</svg>
