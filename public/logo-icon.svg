<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 60" fill="none">
  <!-- 안테나 볼 -->
  <circle cx="27" cy="5" r="4" fill="#7c3aed"/>
  <line x1="27" y1="9" x2="27" y2="14" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 머리 -->
  <rect x="6" y="14" width="42" height="38" rx="14" fill="#7c3aed"/>

  <!-- 왼쪽 눈 흰자 -->
  <rect x="12" y="22" width="11" height="16" rx="5.5" fill="white">
    <animate attributeName="height" values="16;16;2;16;16" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="22;22;29;22;22" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- 왼쪽 눈동자 -->
  <circle cx="17.5" cy="30" r="2.8" fill="#3b0764">
    <animate attributeName="cx" values="17.5;19.5;19.5;17.5;15.5;15.5;17.5;17.5" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.8;2.8;0;2.8;2.8" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 오른쪽 눈 흰자 -->
  <rect x="31" y="22" width="11" height="16" rx="5.5" fill="white">
    <animate attributeName="height" values="16;16;2;16;16" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="22;22;29;22;22" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- 오른쪽 눈동자 -->
  <circle cx="36.5" cy="30" r="2.8" fill="#3b0764">
    <animate attributeName="cx" values="36.5;38.5;38.5;36.5;34.5;34.5;36.5;36.5" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.8;2.8;0;2.8;2.8" keyTimes="0;0.55;0.6;0.65;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 왼쪽 작은 팔 -->
  <path d="M6 38 Q0 36 0 41 Q0 46 6 44" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- 오른쪽 집게발 (C형) — 딸깍 애니메이션 -->
  <g>
    <path d="M48 18 Q62 30 48 42" stroke="#7c3aed" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <circle cx="48" cy="18" r="4" fill="#7c3aed"/>
    <circle cx="48" cy="42" r="4" fill="#7c3aed"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 48 30; -14 48 30; -14 48 30; 0 48 30; 0 48 30"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline" keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s" repeatCount="indefinite"/>
  </g>
</svg>
