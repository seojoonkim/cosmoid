<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 50" fill="none">
  <!-- 안테나 -->
  <line x1="27" y1="11" x2="33" y2="2"
        stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 몸통 -->
  <rect x="3" y="10" width="38" height="33" rx="11" fill="#7c3aed"/>

  <!-- 왼쪽 눈 (흰 흰자) -->
  <rect x="11.5" y="20" width="8" height="13" rx="4" fill="white">
    <animate attributeName="height" values="13;13;2;13;13;13" keyTimes="0;0.55;0.6;0.65;0.85;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;20;25.5;20;20;20" keyTimes="0;0.55;0.6;0.65;0.85;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- 왼쪽 눈동자 -->
  <circle cx="15.5" cy="26.5" r="2.5" fill="#3b0764">
    <animate attributeName="cx" values="15.5;17;17;15.5;14;14;15.5;15.5" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="26.5;26.5;26.5;26.5;26.5;26.5;26.5;26.5" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;2.5;2.5;2.5;2.5;2.5;0;2.5" keyTimes="0;0.55;0.58;0.6;0.62;0.65;0.625;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 오른쪽 눈 (흰 흰자) -->
  <rect x="24.5" y="20" width="8" height="13" rx="4" fill="white">
    <animate attributeName="height" values="13;13;2;13;13;13" keyTimes="0;0.55;0.6;0.65;0.85;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;20;25.5;20;20;20" keyTimes="0;0.55;0.6;0.65;0.85;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- 오른쪽 눈동자 -->
  <circle cx="28.5" cy="26.5" r="2.5" fill="#3b0764">
    <animate attributeName="cx" values="28.5;30;30;28.5;27;27;28.5;28.5" keyTimes="0;0.15;0.3;0.4;0.5;0.65;0.75;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;2.5;2.5;2.5;2.5;2.5;0;2.5" keyTimes="0;0.55;0.58;0.6;0.62;0.65;0.625;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 짧은 팔 -->
  <line x1="41" y1="28" x2="46" y2="28"
        stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>

  <!-- 위 집게 -->
  <g>
    <path d="M46 24 C50 17 56 12 61 15 L59 22 L57 19 L54 24 L52 21 L49 26 L47 23 L46 29 Z" fill="#7c3aed"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 46 28; 18 46 28; 18 46 28; 0 46 28; 0 46 28"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline" keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s" repeatCount="indefinite"/>
  </g>

  <!-- 아래 집게 -->
  <g>
    <path d="M46 32 C50 39 56 44 61 41 L59 34 L57 37 L54 32 L52 35 L49 30 L47 33 L46 29 Z" fill="#7c3aed"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 46 28; -18 46 28; -18 46 28; 0 46 28; 0 46 28"
      keyTimes="0; 0.12; 0.35; 0.5; 1"
      calcMode="spline" keySplines="0.2 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
      dur="2.4s" repeatCount="indefinite"/>
  </g>
</svg>
