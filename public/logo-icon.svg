<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- 궤도 뒤쪽 (행성 뒤) -->
  <ellipse cx="21" cy="21" rx="20" ry="7"
    stroke="#818cf8" stroke-width="2.4" fill="none"
    stroke-dasharray="26 34"
    transform="rotate(-20 21 21)"/>

  <!-- 행성 원 -->
  <circle cx="21" cy="21" r="13" fill="#7c3aed"/>

  <!-- 궤도 앞쪽 (행성 위) -->
  <ellipse cx="21" cy="21" rx="20" ry="7"
    stroke="#38bdf8" stroke-width="2.4" fill="none"
    stroke-dasharray="26 34"
    stroke-dashoffset="34"
    transform="rotate(-20 21 21)"/>

  <!-- 말풍선 꼬리 (오른쪽 하단) -->
  <path d="M30 30 L38 38 L27 33 Z" fill="#7c3aed"/>

  <!-- 채팅 점 3개 -->
  <circle cx="15" cy="22" r="2.2" fill="white"/>
  <circle cx="21" cy="22" r="2.2" fill="white"/>
  <circle cx="27" cy="22" r="2.2" fill="white"/>

  <!-- 위성 -->
